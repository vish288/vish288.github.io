  <body>
    <div id="root"></div>
    <!-- SPA redirect handler: restores route from 404.html redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          var path = decoded.split('?')[0];
          var query = decoded.split('?').slice(1).join('?');
          var url = path.replace(/^\/?\?p=/, '') + (query ? '?' + query.replace(/^q=/, '') : '') + l.hash;
          window.history.replaceState(null, null, '/' + url);
        }
      }(window.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
