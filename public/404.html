<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages
      // Preserves the path and query string by storing in sessionStorage,
      // then index.html restores the correct route via history.replaceState
      var pathSegmentsToKeep = 0;
      var l = window.location;
      var path = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      l.replace(path);
    </script>
  </head>
  <body>
  </body>
</html>
