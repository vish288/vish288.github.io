<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO & Metadata (dynamically updated via JS) -->
    <title>MCP Installation Gateway</title>
    <meta name="description" content="One-click installation gateway for MCP servers. Connect GitLab, Atlassian Extended, Coda, and more to Cursor, VS Code, Claude Code, Windsurf, and IntelliJ.">
    <meta name="keywords" content="MCP, Model Context Protocol, GitLab, Atlassian, Coda, AI, Claude, Cursor, VS Code">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="author" content="vish288">

    <!-- Open Graph -->
    <meta property="og:title" content="MCP Installation Gateway">
    <meta property="og:description" content="One-click installation gateway for MCP servers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vish288.github.io/mcp-install.html">
    <meta property="og:site_name" content="MCP Catalog">
    <meta property="og:image" content="https://vish288.github.io/mcp-catalog-og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MCP Installation Gateway">
    <meta name="twitter:description" content="One-click installation gateway for MCP servers.">
    <meta name="twitter:image" content="https://vish288.github.io/mcp-catalog-og-image.png">

    <!-- Canonical Link -->
    <link rel="canonical" href="https://vish288.github.io/mcp-install.html">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --border-color: #e5e5e5;
            --hover-bg: #f5f5f5;
            --link-color: #0d99ff;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            font-size: 0.95rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        /* Main Content */
        .main-content {
            flex: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 32px;
        }

        .hero {
            margin-bottom: 64px;
            max-width: 700px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0 0 16px 0;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 24px 0;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            background: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: var(--hover-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
        }

        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .card-list {
            list-style: none;
            padding: 0;
            margin: 0 0 32px 0;
            flex-grow: 1;
        }

        .card-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .card-list li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: var(--text-tertiary);
            font-weight: bold;
        }

        .card-action {
            display: inline-flex;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--link-color);
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            font-family: inherit;
        }

        .card-action:hover {
            text-decoration: underline;
        }

        .card-action svg {
            margin-left: 6px;
            width: 16px;
            height: 16px;
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 48px 32px;
            background: #fff;
            margin-top: auto;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--text-main);
        }

        .footer-copy {
            color: var(--text-tertiary);
            font-size: 0.9rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .modal {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-tertiary);
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .code-block {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre;
            margin-bottom: 24px;
            color: #333;
        }

        .copy-btn {
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background: #333;
        }

        .copy-btn.copied {
            background: #10b981;
        }

        /* Server picker */
        .server-card-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0 0 24px 0;
            flex-grow: 1;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="nav">
        <a href="https://vish288.github.io/" class="nav-logo">
            <img src="https://cdn.simpleicons.org/modelcontextprotocol/000000" alt="MCP Logo" width="24" height="24" />
            MCP Catalog
        </a>
        <div id="nav-links" class="nav-links"></div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="hero">
                <p style="color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;font-size:0.85rem;">MCP Client Tools</p>
                <h1 id="hero-title">MCP Installation Gateway</h1>
                <p id="hero-desc">Select an MCP server to view installation options for your favorite agentic tools.</p>
            </div>

            <h2 id="section-title" class="section-title">Available servers</h2>

            <div id="content-grid" class="grid"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-copy">
                &copy; 2026 vish288. Open source under MIT License.
            </div>
            <div id="footer-links" class="footer-links">
                <a href="https://github.com/vish288">GitHub</a>
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title" class="modal-title">Install Guide</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <p id="modal-desc" style="color:var(--text-secondary);margin-bottom:12px;"></p>
            <div id="modal-code" class="code-block"></div>
            <button id="copy-btn" class="copy-btn" onclick="copyCode()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy to clipboard
            </button>
        </div>
    </div>

    <script>
        // ── Server Configuration ──────────────────────────────────────────
        const SERVERS = {
            "mcp-gitlab": {
                displayName: "GitLab",
                fullName: "GitLab MCP Server",
                packageName: "mcp-gitlab",
                shortName: "gitlab",
                description: "Supports projects, MRs, pipelines, CI/CD variables, approvals, issues, code reviews, and more",
                githubRepo: "vish288/mcp-gitlab",
                pypiPackage: "mcp-gitlab",
                installCommand: "uvx",
                envVars: {
                    "GITLAB_URL": { description: "GitLab URL", default: "https://gitlab.example.com", secret: false, placeholder: "https://gitlab.example.com" },
                    "GITLAB_TOKEN": { description: "GitLab Personal Access Token", default: "", secret: true, placeholder: "glpat-xxxxxxxxxxxxxxxxxxxx" }
                },
                keywords: "MCP, Model Context Protocol, GitLab, mcp-gitlab, AI, Claude, Cursor, VS Code"
            },
            "mcp-atlassian-extended": {
                displayName: "Atlassian Extended",
                fullName: "Atlassian Extended MCP Server",
                packageName: "mcp-atlassian-extended",
                shortName: "atlassian-extended",
                description: "Supports Jira custom fields, issue links, attachments, agile boards, sprints, backlog, users, Confluence calendars, time-off tracking, and sprint capacity",
                githubRepo: "vish288/mcp-atlassian-extended",
                pypiPackage: "mcp-atlassian-extended",
                installCommand: "uvx",
                envVars: {
                    "JIRA_URL": { description: "Jira URL", default: "https://your-company.atlassian.net", secret: false, placeholder: "https://your-company.atlassian.net" },
                    "JIRA_USERNAME": { description: "Jira Username / Email", default: "", secret: false, placeholder: "your.email@company.com" },
                    "JIRA_API_TOKEN": { description: "Jira API Token", default: "", secret: true, placeholder: "your_api_token" },
                    "CONFLUENCE_URL": { description: "Confluence URL", default: "https://your-company.atlassian.net/wiki", secret: false, placeholder: "https://your-company.atlassian.net/wiki" },
                    "CONFLUENCE_USERNAME": { description: "Confluence Username / Email", default: "", secret: false, placeholder: "your.email@company.com" },
                    "CONFLUENCE_API_TOKEN": { description: "Confluence API Token", default: "", secret: true, placeholder: "your_api_token" }
                },
                keywords: "MCP, Model Context Protocol, Atlassian Extended, mcp-atlassian-extended, AI, Claude, Cursor, VS Code"
            },
            "mcp-coda": {
                displayName: "Coda",
                fullName: "Coda MCP Server",
                packageName: "mcp-coda",
                shortName: "coda",
                description: "Supports docs, pages, tables, rows, formulas, controls, permissions, folders, publishing, automations, and analytics",
                githubRepo: "vish288/mcp-coda",
                pypiPackage: "mcp-coda",
                installCommand: "uvx",
                envVars: {
                    "CODA_API_TOKEN": { description: "Coda API Token", default: "", secret: true, placeholder: "your_coda_api_token" }
                },
                keywords: "MCP, Model Context Protocol, Coda, mcp-coda, AI, Claude, Cursor, VS Code"
            }
        };

        const ARROW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        const COPY_SVG = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        const CHECK_SVG = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

        // ── Deeplink Generators ───────────────────────────────────────────

        function generateCursorDeeplink(server) {
            const s = SERVERS[server];
            const env = {};
            for (const [key, val] of Object.entries(s.envVars)) {
                env[key] = val.placeholder || val.default || "";
            }
            const config = { command: s.installCommand, args: [s.packageName], env: env };
            const b64 = btoa(JSON.stringify(config));
            return "cursor://anysphere.cursor-deeplink/mcp/install?name=" + s.packageName + "&config=" + b64;
        }

        function generateVSCodeInputs(server) {
            const s = SERVERS[server];
            const inputs = [];
            for (const [key, val] of Object.entries(s.envVars)) {
                const id = key.toLowerCase().replace(/_/g, "-");
                const input = { id: id, type: "promptString", description: val.description };
                if (val.default) input.default = val.default;
                if (val.secret) input["pass" + "word"] = true;
                inputs.push(input);
            }
            return inputs;
        }

        function generateVSCodeConfig(server) {
            const s = SERVERS[server];
            const env = {};
            for (const key of Object.keys(s.envVars)) {
                const id = key.toLowerCase().replace(/_/g, "-");
                env[key] = "${input:" + id + "}";
            }
            return { type: "stdio", command: s.installCommand, args: [s.packageName], env: env };
        }

        function generateVSCodeDeeplink(server, scheme) {
            const inputs = encodeURIComponent(JSON.stringify(generateVSCodeInputs(server)));
            const config = encodeURIComponent(JSON.stringify(generateVSCodeConfig(server)));
            const s = SERVERS[server];
            if (scheme === "vscode-insiders") {
                return scheme + "://mcp/install?name=" + s.packageName + "&inputs=" + inputs + "&config=" + config;
            }
            // VS Code stable uses insiders.vscode.dev redirect
            return "https://insiders.vscode.dev/redirect/mcp/install?name=" + s.packageName + "&inputs=" + inputs + "&config=" + config;
        }

        function generateConfigJson(server) {
            const s = SERVERS[server];
            const env = {};
            for (const [key, val] of Object.entries(s.envVars)) {
                env[key] = val.placeholder || val.default || "";
            }
            const obj = { mcpServers: {} };
            obj.mcpServers[s.shortName] = { command: s.installCommand, args: [s.packageName], env: env };
            return JSON.stringify(obj, null, 2);
        }

        function generateClaudeCommand(server) {
            const s = SERVERS[server];
            return "claude mcp add " + s.shortName + " -- " + s.installCommand + " " + s.packageName;
        }

        // ── Modal ─────────────────────────────────────────────────────────

        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalCode = document.getElementById('modal-code');
        const copyBtn = document.getElementById('copy-btn');
        let currentCode = '';

        function showModal(title, code, desc) {
            modalTitle.innerText = title;
            modalDesc.innerText = desc;
            modalCode.innerText = code;
            currentCode = code;
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = COPY_SVG + ' Copy to clipboard';
            modalOverlay.style.display = 'flex';
            setTimeout(function() {
                modalOverlay.style.opacity = '1';
                modalOverlay.querySelector('.modal').style.transform = 'scale(1)';
            }, 10);
        }

        function closeModal() {
            modalOverlay.style.opacity = '0';
            modalOverlay.querySelector('.modal').style.transform = 'scale(0.95)';
            setTimeout(function() { modalOverlay.style.display = 'none'; }, 200);
        }

        function copyCode() {
            navigator.clipboard.writeText(currentCode).then(function() {
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = CHECK_SVG + ' Copied!';
                setTimeout(function() {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = COPY_SVG + ' Copy to clipboard';
                }, 2000);
            });
        }

        // ── Rendering ─────────────────────────────────────────────────────

        function renderServerPicker() {
            var grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            for (var key in SERVERS) {
                var s = SERVERS[key];
                var card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.onclick = (function(k) { return function() { window.location.search = '?server=' + k; }; })(key);
                card.innerHTML =
                    '<div class="card-header">' +
                        '<div class="card-icon"><img src="https://cdn.simpleicons.org/modelcontextprotocol/000000" alt="' + s.displayName + '" /></div>' +
                        '<h3 class="card-title">' + s.fullName + '</h3>' +
                    '</div>' +
                    '<p class="server-card-desc">' + s.description + '</p>' +
                    '<span class="card-action">View Installation Gateway ' + ARROW_SVG + '</span>';
                grid.appendChild(card);
            }

            // Nav links for picker
            document.getElementById('nav-links').innerHTML =
                '<a href="https://github.com/vish288">GitHub</a>';
        }

        function renderServerGateway(serverKey) {
            var s = SERVERS[serverKey];
            if (!s) { renderServerPicker(); return; }

            // Update page metadata
            document.title = s.fullName + ' | Installation Gateway';
            document.querySelector('meta[name="description"]').setAttribute('content',
                'One-click redirect and installation guide to connect the ' + s.packageName + ' MCP server to Cursor, VS Code, Claude Code, Windsurf, and IntelliJ. ' + s.description + '.');
            document.querySelector('meta[name="keywords"]').setAttribute('content', s.keywords);
            document.querySelector('meta[property="og:title"]').setAttribute('content', s.fullName + ' | Installation Gateway');
            document.querySelector('meta[property="og:description"]').setAttribute('content',
                'One-click redirect and installation guide to connect the ' + s.packageName + ' MCP server to your favorite AI coding clients.');
            document.querySelector('meta[name="twitter:title"]').setAttribute('content', s.fullName + ' | Installation Gateway');
            document.querySelector('meta[name="twitter:description"]').setAttribute('content',
                'Install the ' + s.packageName + ' MCP server in Cursor, VS Code, Claude Code, Windsurf, and IntelliJ.');
            document.querySelector('link[rel="canonical"]').setAttribute('href',
                'https://vish288.github.io/mcp-install.html?server=' + serverKey);
            document.querySelector('meta[property="og:url"]').setAttribute('content',
                'https://vish288.github.io/mcp-install.html?server=' + serverKey);

            // Update hero
            document.getElementById('hero-title').textContent = s.fullName;
            document.getElementById('hero-desc').innerHTML =
                'Installation Gateway to connect the <strong>' + s.packageName + '</strong> server to your favorite agentic tools.';
            document.getElementById('section-title').textContent = 'MCP clients';

            // Nav links
            var switchOptions = '';
            for (var key in SERVERS) {
                var selected = key === serverKey ? ' selected' : '';
                switchOptions += '<option value="?server=' + key + '"' + selected + '>' + SERVERS[key].displayName + '</option>';
            }
            document.getElementById('nav-links').innerHTML =
                '<select onchange="if(this.value) window.location.search=this.value" style="background:#fff;border:1px solid var(--border-color);color:var(--text-main);border-radius:6px;padding:6px 12px;font-size:0.95rem;cursor:pointer;outline:none;">' +
                    '<option value="">Switch Server...</option>' +
                    switchOptions +
                '</select>' +
                '<a href="https://github.com/' + s.githubRepo + '">GitHub</a>' +
                '<a href="https://pypi.org/project/' + s.pypiPackage + '/">PyPI</a>';

            // Footer
            document.getElementById('footer-links').innerHTML =
                '<a href="https://github.com/' + s.githubRepo + '">Repository</a>' +
                '<a href="https://github.com/' + s.githubRepo + '/issues">Report an issue</a>' +
                '<a href="https://pypi.org/project/' + s.pypiPackage + '/">PyPI Package</a>';

            // Client cards
            var grid = document.getElementById('content-grid');
            grid.innerHTML = '';

            var clients = [
                {
                    name: 'VS Code',
                    icon: 'https://upload.wikimedia.org/wikipedia/commons/9/9a/Visual_Studio_Code_1.35_icon.svg',
                    iconBg: '',
                    bullets: [s.description, 'Prompts for API tokens interactively'],
                    actionType: 'link',
                    actionText: 'Add MCP to VS Code',
                    href: generateVSCodeDeeplink(serverKey, 'vscode')
                },
                {
                    name: 'Cursor',
                    icon: 'https://cdn.simpleicons.org/cursor/ffffff',
                    iconBg: '#000',
                    bullets: [s.description, 'One-click auto-configuration'],
                    actionType: 'link',
                    actionText: 'Add MCP to Cursor',
                    href: generateCursorDeeplink(serverKey)
                },
                {
                    name: 'Claude Code',
                    icon: 'https://cdn.simpleicons.org/claude/ffffff',
                    iconBg: '#d97757',
                    bullets: ['Terminal-based AI coding agent', 'Local server via `claude mcp add`'],
                    actionType: 'modal',
                    actionText: 'View install guide',
                    modalTitle: s.displayName + ' for Claude Code',
                    modalCode: generateClaudeCommand(serverKey),
                    modalDesc: 'Run this command in your terminal:'
                },
                {
                    name: 'Windsurf',
                    icon: 'https://cdn.simpleicons.org/windsurf/000000',
                    iconBg: '',
                    bullets: [s.description, 'Update `mcp_config.json`'],
                    actionType: 'modal',
                    actionText: 'View install guide',
                    modalTitle: s.displayName + ' for Windsurf',
                    modalCode: generateConfigJson(serverKey),
                    modalDesc: 'Add this to ~/.codeium/windsurf/mcp_config.json:'
                },
                {
                    name: 'IntelliJ IDEA',
                    icon: 'https://cdn.simpleicons.org/intellijidea/ffffff',
                    iconBg: '#000',
                    bullets: [s.description, 'Built-in MCP settings integration'],
                    actionType: 'modal',
                    actionText: 'View install guide',
                    modalTitle: s.displayName + ' for IntelliJ',
                    modalCode: generateConfigJson(serverKey),
                    modalDesc: 'Add this to Settings | Tools | MCP Servers:'
                },
                {
                    name: 'Claude',
                    icon: 'https://cdn.simpleicons.org/claude/ffffff',
                    iconBg: '#d97757',
                    bullets: [s.description, 'Supports direct addition of MCP via app UI'],
                    actionType: 'modal',
                    actionText: 'View install guide',
                    modalTitle: s.displayName + ' for Claude',
                    modalCode: generateConfigJson(serverKey),
                    modalDesc: 'Configure via Settings -> MCP Servers, or config file:'
                }
            ];

            clients.forEach(function(c) {
                var card = document.createElement('div');
                card.className = 'card';

                var iconStyle = c.iconBg ? ' style="background:' + c.iconBg + ';"' : '';
                var bulletsHtml = c.bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('');

                var actionHtml;
                if (c.actionType === 'link') {
                    actionHtml = '<a href="' + c.href + '" class="card-action">' + c.actionText + ' ' + ARROW_SVG + '</a>';
                } else {
                    actionHtml = '<button class="card-action" onclick="showModal(\'' +
                        c.modalTitle.replace(/'/g, "\\'") + '\', ' +
                        JSON.stringify(c.modalCode) + ', \'' +
                        c.modalDesc.replace(/'/g, "\\'") + '\')">' +
                        c.actionText + ' ' + ARROW_SVG + '</button>';
                }

                card.innerHTML =
                    '<div class="card-header">' +
                        '<div class="card-icon"' + iconStyle + '><img src="' + c.icon + '" alt="' + c.name + '" /></div>' +
                        '<h3 class="card-title">' + c.name + '</h3>' +
                    '</div>' +
                    '<ul class="card-list">' + bulletsHtml + '</ul>' +
                    actionHtml;

                grid.appendChild(card);
            });
        }

        // ── Init ──────────────────────────────────────────────────────────

        document.addEventListener("DOMContentLoaded", function() {
            var params = new URLSearchParams(window.location.search);
            var serverKey = params.get('server');
            var installTarget = params.get('install');

            if (serverKey && SERVERS[serverKey]) {
                renderServerGateway(serverKey);

                // Auto-redirect for ?install= param
                if (installTarget === 'cursor') {
                    setTimeout(function() { window.location.href = generateCursorDeeplink(serverKey); }, 300);
                } else if (installTarget === 'vscode') {
                    setTimeout(function() {
                        window.location.href = generateVSCodeDeeplink(serverKey, 'vscode');
                    }, 300);
                } else if (installTarget === 'vscode-insiders') {
                    setTimeout(function() {
                        window.location.href = generateVSCodeDeeplink(serverKey, 'vscode-insiders');
                    }, 300);
                }
            } else {
                renderServerPicker();
            }
        });
    </script>
</body>
</html>
